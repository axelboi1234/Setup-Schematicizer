<!DOCTYPE html>
<html lang="en">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<head>
  <meta charset="UTF-8">
  <title>Signal Chain Designer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet">

  <style>
    /*Colours for everything*/
    :root {
      --bg: #000000;
      --panel: #24211d;
      --panel2: #2b2721;
      --panel3: #221e19;
      --border: #3c362d;
      --border-soft: #302b24;
      --text: #ece7dd;
      --text-dim: #a49d8f;
      --text-faint: #6d685d;
      --instrument: #e8a33d;
      --effect: #d4653a;
      --looper: #3fae9c;
      --accessory: #d9c25a;
      --mixer: #9b7fd1;
      --interface: #5b93c9;
      --daw: #7fae5c;
      --monitor: #c96b8a;
      --other: #8a8880;
      --midi: #5fc9d9;
      --danger: #c9615f;
      font-family: 'Inter', sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    button,
    input,
    select {
      font-family: inherit;
      appearance: none;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /*Topbar*/
    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 16px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      flex: none;
      z-index: 10;
    }

    .topbar h1 {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin: 0;
    }

    .tagline {
      font-size: 11px;
      color: var(--text-faint);
      margin-right: 6px;
    }

    .name-input {
      background: var(--panel2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      padding: 7px 10px;
      border-radius: 4px;
      width: 190px;
    }

    .name-input:focus {
      outline: 1px solid var(--instrument);
    }

    .btn {
      background: var(--panel2);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 13px;
      font-weight: 500;
      padding: 7px 12px;
      border-radius: 4px;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn:hover {
      border-color: var(--text-faint);
    }

    .btn.primary {
      background: var(--instrument);
      border-color: var(--instrument);
      color: #241a08;
    }

    .btn.primary:hover {
      filter: brightness(1.08);
    }

    .spacer {
      flex: 1;
    }

    .status {
      font-size: 12px;
      color: var(--text-faint);
      font-family: 'JetBrains Mono', monospace;
      min-width: 100px;
      text-align: right;
    }

    /*Zoom controls*/
    .zoom-controls {
      display: flex;
      align-items: center;
      gap: 4px;
      background: var(--panel2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px;
    }

    .zoom-controls button {
      background: transparent;
      border: none;
      color: var(--text);
      cursor: pointer;
      padding: 4px 8px;
      font-size: 12px;
      font-weight: 600;
    }

    .zoom-controls button:hover {
      background: var(--panel3);
      border-radius: 2px;
    }

    .zoom-level {
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-dim);
      padding: 0 6px;
      min-width: 42px;
      text-align: center;
    }

    .main {
      display: flex;
      flex: 1;
      min-height: 0;
      position: relative;
    }

    /*Sidebar*/
    .sidebar {
      width: 216px;
      flex: none;
      background: var(--panel);
      border-right: 1px solid var(--border);
      padding: 12px;
      overflow-y: auto;
      z-index: 9;
    }

    .search-input {
      width: 100%;
      background: var(--panel2);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 12.5px;
      padding: 7px 9px;
      border-radius: 4px;
      margin-bottom: 12px;
    }

    .search-input:focus {
      outline: 1px solid var(--instrument);
    }

    .search-input::placeholder {
      color: var(--text-faint);
    }

    details.cat-group {
      margin-bottom: 4px;
    }

    details.cat-group summary {
      cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--text-dim);
      padding: 6px 2px;
      display: flex;
      align-items: center;
      gap: 7px;
      list-style: none;
    }

    details.cat-group summary::-webkit-details-marker {
      display: none;
    }

    details.cat-group summary::before {
      content: '▸';
      font-size: 9px;
      color: var(--text-faint);
      display: inline-block;
      transition: transform .15s;
    }

    details.cat-group[open] summary::before {
      transform: rotate(90deg);
    }

    .swatch {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex: none;
      display: inline-block;
    }

    .swatch.midi {
      border-radius: 3px;
    }

    .swatch.control {
      border-radius: 2px;
      transform: rotate(45deg);
    }

    .palette-item {
      display: block;
      width: 100%;
      background: var(--panel2);
      border: 1px solid var(--border);
      border-left: 3px solid var(--nc);
      color: var(--text);
      font-size: 12px;
      font-weight: 500;
      padding: 7px 8px;
      border-radius: 4px;
      cursor: pointer;
      margin: 0 0 5px 3px;
      text-align: left;
    }

    .palette-item:hover {
      background: #332e26;
    }

    .sidebar .hint {
      font-size: 11px;
      line-height: 1.55;
      color: var(--text-faint);
      margin-top: 10px;
      padding-top: 12px;
      border-top: 1px solid var(--border-soft);
    }

    .sidebar .hint b {
      color: var(--text-dim)
    }

    /*Canvas*/
    .canvas-col {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
      background: #141210;
      position: relative;
    }

    .canvas-viewport {
      flex: 1;
      overflow: hidden;
      position: relative;
      cursor: grab;
    }

    .canvas-viewport:active {
      cursor: grabbing;
    }

    .canvas {
      position: absolute;
      width: 4000px;
      height: 4000px;
      background-color: var(--bg);
      background-image: radial-gradient(circle, #3a352c 1px, transparent 1px);
      background-size: 22px 22px;
      transform-origin: 0 0;
    }

    /*Cables*/
    svg.cables {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
      overflow: visible;
      z-index: 2;
    }

    svg.cables path.cable-hit {
      stroke: transparent;
      stroke-width: 15;
      fill: none;
      pointer-events: stroke;
      cursor: pointer;
    }

    svg.cables path.cable {
      fill: none;
      stroke-width: 3;
      stroke-linecap: round;
      pointer-events: none;
      transition: stroke-width .12s, filter .12s;
    }

    svg.cables path.cable.selected {
      stroke-width: 5;
    }

    svg.cables path.cable-hit:hover+path.cable {
      stroke-width: 5;
      filter: brightness(1.2);
    }

    svg.cables .cap {
      pointer-events: none;
    }

    svg.cables .cable-tag {
      pointer-events: none;
    }

    .cable-del {
      cursor: pointer;
    }

    .cable-label-input {
      position: absolute;
      z-index: 5;
      width: 140px;
      background: var(--panel2);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 11px;
      padding: 4px 7px;
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
      display: none;
    }

    .cable-label-input:focus {
      outline: 1px solid var(--instrument);
    }

    /*Nodes*/
    .node {
      position: absolute;
      background: linear-gradient(180deg, var(--panel2) 0%, var(--panel3) 100%);
      border: 1px solid var(--border);
      border-radius: 5px;
      box-shadow: 0 3px 10px rgba(0, 0, 0, .4);
      z-index: 3;
    }

    .node-bar {
      height: 6px;
      border-radius: 5px 5px 0 0;
      background: var(--nc);
      cursor: grab;
      user-select: none;
    }

    .node-bar:active {
      cursor: grabbing;
    }

    .screw {
      position: absolute;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 32%, #8a8880, #322e28 72%);
      z-index: 2;
      user-select: none;
    }

    .screw.tl {
      top: 3px;
      left: 3px;
    }

    .screw.tr {
      top: 3px;
      right: 3px;
    }

    .screw.bl {
      bottom: 3px;
      left: 3px;
    }

    .screw.br {
      bottom: 3px;
      right: 3px;
    }

    .node-del {
      position: absolute;
      top: 8px;
      right: 9px;
      width: 16px;
      height: 16px;
      border: none;
      background: transparent;
      color: var(--text-faint);
      font-size: 14px;
      line-height: 1;
      cursor: pointer;
      border-radius: 3px;
      padding: 0;
    }

    .node-del:hover {
      color: var(--danger);
      background: rgba(255, 255, 255, .06);
    }

    .node-body {
      padding: 7px 12px 8px;
    }

    .node-top {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 5px;
    }

    .node-icon {
      flex: none;
      width: 24px;
      height: 24px;
      color: var(--nc);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .node-icon svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .cat-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--nc);
      margin: 0 0 2px;
    }

    .node-label {
      display: block;
      width: 100%;
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 12.5px;
      font-weight: 600;
      padding: 0;
      margin: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .node-label:focus {
      outline: none;
      border-bottom: 1px solid var(--text-faint);
    }

    .node-label.static {
      cursor: default;
    }

    .node-sub {
      display: block;
      width: 100%;
      background: transparent;
      border: none;
      color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      padding: 0;
    }

    .node-sub:focus {
      outline: none;
      border-bottom: 1px solid var(--text-faint);
    }

    .node-sub::placeholder {
      color: var(--text-faint);
    }


    .io-controls {
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px solid var(--border-soft);
    }

    .io-controls.stacked {
      flex-direction: column;
      gap: 4px;
    }

    .io-row {
      display: flex;
      align-items: center;
      gap: 4px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9.5px;
      color: var(--text-faint);
      user-select: none;
    }

    .io-row b {
      color: var(--text);
      font-size: 11px;
      font-weight: 600;
      min-width: 14px;
      text-align: center;
    }

    .io-row button {
      width: 15px;
      height: 15px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text-dim);
      border-radius: 3px;
      cursor: pointer;
      font-size: 11px;
      line-height: 1;
      padding: 0;
      flex: none;
    }

    .io-row button:hover {
      border-color: var(--text-faint);
      color: var(--text);
    }

    .type-pick {
      width: 58px;
      height: 16px;
      font-size: 9px;
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text-dim);
      border-radius: 3px;
      padding: 0 2px;
      margin-left: auto;
    }

    /*Routing*/
    .routing {
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px solid var(--border-soft);
    }

    .routing-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--text-faint);
      margin-bottom: 4px;
    }

    .routing-row {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-bottom: 3px;
    }

    .routing-row-out {
      flex-direction: column;
      align-items: stretch;
      gap: 2px;
    }

    .routing-row-top {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .routing-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 8.5px;
      color: var(--text-faint);
      width: 64px;
      flex: none;
    }

    .routing-row input {
      flex: 1;
      min-width: 0;
      background: var(--panel3);
      border: 1px solid var(--border-soft);
      border-radius: 3px;
      color: var(--text);
      font-size: 10.5px;
      padding: 2px 5px;
    }

    .routing-row input:focus {
      outline: 1px solid var(--daw);
    }

    .routing-source {
      width: 100%;
      background: var(--panel3);
      border: 1px solid var(--border-soft);
      border-radius: 3px;
      color: var(--text-dim);
      font-size: 9px;
      padding: 2px 4px;
    }

    /*Ports*/
    .port {
      position: absolute;
      width: 15px;
      height: 15px;
      border-radius: 50%;
      transform: translateY(-50%);
      background: radial-gradient(circle at 35% 30%, #6b665d, #17140f 78%);
      border: 2px solid var(--nc);
      box-shadow: inset 0 0 0 2px #100d09, 0 1px 2px rgba(0, 0, 0, .5);
      cursor: crosshair;
      z-index: 3;
    }

    .port.in {
      left: -8px;
    }

    .port.out {
      right: -8px;
    }

    .port.midi {
      border-radius: 4px;
      border-color: var(--midi);
    }

    .port.control {
      border-radius: 2px;
      border-color: var(--accessory);
      transform: translateY(-50%) rotate(45deg);
    }

    .port-label {
      position: absolute;
      transform: translateY(-50%);
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: var(--text-faint);
      background: transparent;
      border: none;
      width: 58px;
      padding: 0;
    }

    .port-label.in {
      left: 11px;
      text-align: left;
    }

    .port-label.out {
      right: 11px;
      text-align: right;
    }

    .port-label:focus {
      color: var(--text);
      outline: none;
      border-bottom: 1px solid var(--text-faint);
    }

    .port-label::placeholder {
      color: var(--text-faint);
      opacity: .6;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 9px 14px;
      padding: 8px 16px;
      background: var(--panel);
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace;
      flex: none;
      z-index: 10;
    }

    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    /*Nav buttons?*/
    .nav-btn {
      background: var(--panel2);
      border: 1.6px solid var(--border);
      color: var(--text-dim);
      padding: 6px 14px;
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s ease;
    }

    .nav-btn:hover {
      color: var(--text);
      border-color: var(--text-dim);
    }

    .nav-btn.primary {
      background: var(--text);
      color: var(--panel);
      border-color: var(--text);
    }

    .nav-btn.primary:hover {
      opacity: 0.9;
    }

    .nav-btn.premium-btn {
      background: #e8a33d;
      /* Your instrument accent color */
      color: #000;
      border-color: #e8a33d;
      font-weight: 600;
    }

    .nav-btn.danger:hover {
      border-color: #ff6b6b;
      color: #ff6b6b;
    }

    /* === Custom dialog system (replaces browser alert/confirm/prompt) === */
    .dlg-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .62);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 500;
      opacity: 0;
      pointer-events: none;
      transition: opacity .15s ease;
    }

    .dlg-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .dlg-box {
      width: 360px;
      max-width: calc(100vw - 40px);
      background: linear-gradient(180deg, var(--panel2) 0%, var(--panel3) 100%);
      border: 1px solid var(--border);
      border-radius: 7px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, .55);
      transform: translateY(6px) scale(.98);
      transition: transform .15s ease;
      overflow: hidden;
    }

    .dlg-overlay.open .dlg-box {
      transform: translateY(0) scale(1);
    }

    .dlg-bar {
      height: 6px;
      background: var(--dlg-accent, var(--instrument));
    }

    .dlg-body {
      padding: 18px 20px 16px;
    }

    .dlg-kicker {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--dlg-accent, var(--instrument));
      margin-bottom: 6px;
    }

    .dlg-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }

    .dlg-message {
      font-size: 13px;
      line-height: 1.55;
      color: var(--text-dim);
    }

    .dlg-fields {
      margin-top: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .dlg-field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .dlg-field span {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: .05em;
      text-transform: uppercase;
      color: var(--text-faint);
    }

    .dlg-field input {
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 13px;
      padding: 8px 10px;
      border-radius: 4px;
      font-family: 'Inter', sans-serif;
    }

    .dlg-field input:focus {
      outline: 1px solid var(--dlg-accent, var(--instrument));
      border-color: transparent;
    }

    .dlg-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 18px;
    }

    .btn.danger {
      border-color: var(--danger);
      color: var(--danger);
    }

    .btn.danger:hover {
      background: var(--danger);
      color: #2a0d0d;
    }
  </style>
</head>

<body>
  <div class="app">

    <div class="topbar">
      <h1>Setup Schematicizer</h1>
      <span class="tagline">· &nbspCircuit-Grade Layout Design For Music Rigs</span>

      <input class="name-input" id="setupName" value="Untitled setup" spellcheck="false">

      <button class="btn primary" id="exportBtn">Export Setup</button>
      <button class="btn" id="importBtn">Import Setup</button>
      <button class="btn" id="newBtn">New</button>
      <input type="file" id="fileImporter" accept=".json" style="display:none;">


      <div class="spacer"></div>
      <div class="spacer"></div>

      <div class="zoom-controls">
        <button id="zoomOut" title="Zoom Out">−</button>
        <span class="zoom-level" id="zoomLevel">100%</span>
        <button id="zoomIn" title="Zoom In">+</button>
      </div>

      <div class="nav-controls">


        <div id="logged-out-group" style="display: flex; gap: 10px;">
          <button id="btn-signin" class="nav-btn">Sign In</button>
          <button id="btn-signup" class="nav-btn primary">Sign Up</button>
        </div>

        <div id="logged-in-group" style="display: flex; gap: 10px; display: none;">
          <button id="btn-save-cloud" class="nav-btn cloud-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"
              style="width:14px;height:14px;">
              <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
              <polyline points="17 21 17 13 7 13 7 21" />
              <polyline points="7 3 7 8 15 8" />
            </svg>
            Save to Cloud
          </button>
          <button id="btn-upgrade" class="nav-btn premium-btn">✨ Go Premium</button>
          <button id="btn-signout" class="nav-btn danger">Sign Out</button>
        </div>

      </div>

      <span class="status" id="status"></span>
    </div>

    <div class="main">
      <div class="sidebar">
        <input class="search-input" id="gearSearch" placeholder="Search gear…" spellcheck="false">
        <div id="paletteRoot"></div>
        <div class="hint">
          - Drag modules by their colored top bars. <br>
          - Drag from jack-to-jack to connect. <br>

  <script>
    // === Custom dialog system (replaces browser alert/confirm/prompt) ===
    // Dialog.alert(message, opts) -> Promise<void>
    // Dialog.confirm(message, opts) -> Promise<boolean>
    // Dialog.form(fields, opts)    -> Promise<{[key]: string} | null>
    const Dialog = (() => {
      let overlay, box, resolver;

      function ensure() {
        if (overlay) return;
        overlay = document.createElement('div');
        overlay.className = 'dlg-overlay';
        overlay.innerHTML = `
          <div class="dlg-box" role="dialog" aria-modal="true">
            <div class="dlg-bar"></div>
            <div class="dlg-body">
              <div class="dlg-kicker"></div>
              <div class="dlg-title"></div>
              <div class="dlg-message"></div>
              <div class="dlg-fields"></div>
              <div class="dlg-actions"></div>
            </div>
          </div>`;
        document.body.appendChild(overlay);
        box = overlay.querySelector('.dlg-box');

        overlay.addEventListener('mousedown', (e) => { if (e.target === overlay) close(null); });
        document.addEventListener('keydown', (e) => {
          if (!overlay.classList.contains('open')) return;
          if (e.key === 'Escape') close(null);
          if (e.key === 'Enter') {
            const okBtn = box.querySelector('[data-dlg-ok]');
            if (okBtn) okBtn.click();
          }
        });
      }

      function close(value) {
        overlay.classList.remove('open');
        if (resolver) { resolver(value); resolver = null; }
      }

      function open({ kicker = '', title = '', message = '', fields = [], okText = 'OK', cancelText = 'Cancel', showCancel = false, accent = 'instrument' }) {
        ensure();
        box.style.setProperty('--dlg-accent', `var(--${accent})`);

        const kickerEl = box.querySelector('.dlg-kicker');
        kickerEl.textContent = kicker;
        kickerEl.style.display = kicker ? '' : 'none';

        const titleEl = box.querySelector('.dlg-title');
        titleEl.textContent = title;
        titleEl.style.display = title ? '' : 'none';

        const msgEl = box.querySelector('.dlg-message');
        msgEl.textContent = message;
        msgEl.style.display = message ? '' : 'none';

        const fieldsEl = box.querySelector('.dlg-fields');
        fieldsEl.innerHTML = fields.map(f => `
            <label class="dlg-field">
              <span>${f.label}</span>
              <input type="${f.type || 'text'}" data-dlg-field="${f.key}" placeholder="${f.placeholder || ''}" autocomplete="${f.autocomplete || 'off'}">
            </label>`).join('');
        fieldsEl.style.display = fields.length ? '' : 'none';

        const actionsEl = box.querySelector('.dlg-actions');
        actionsEl.innerHTML = (showCancel ? `<button class="btn" data-dlg-cancel>${cancelText}</button>` : '') +
          `<button class="btn primary" data-dlg-ok>${okText}</button>`;

        overlay.classList.add('open');
        const firstInput = fieldsEl.querySelector('input');
        setTimeout(() => (firstInput || actionsEl.querySelector('[data-dlg-ok]')).focus(), 30);

        return new Promise(resolve => {
          resolver = resolve;
          actionsEl.querySelector('[data-dlg-ok]').onclick = () => {
            if (fields.length) {
              const out = {};
              fields.forEach(f => { out[f.key] = fieldsEl.querySelector(`[data-dlg-field="${f.key}"]`).value; });
              close(out);
            } else {
              close(true);
            }
          };
          const cancelBtn = actionsEl.querySelector('[data-dlg-cancel]');
          if (cancelBtn) cancelBtn.onclick = () => close(fields.length ? null : false);
        });
      }

      return {
        alert(message, opts = {}) {
          return open({ kicker: opts.kicker ?? 'NOTICE', title: opts.title || '', message, okText: opts.okText || 'OK', accent: opts.accent || 'instrument' });
        },
        confirm(message, opts = {}) {
          return open({ kicker: opts.kicker ?? 'CONFIRM', title: opts.title || '', message, okText: opts.okText || 'Confirm', cancelText: opts.cancelText || 'Cancel', showCancel: true, accent: opts.accent || 'danger' });
        },
        form(fields, opts = {}) {
          return open({ kicker: opts.kicker || '', title: opts.title || '', message: opts.message || '', fields, okText: opts.okText || 'Submit', cancelText: opts.cancelText || 'Cancel', showCancel: true, accent: opts.accent || 'instrument' });
        }
      };
    })();
  </script>

      if (ADJUSTABLE_CATS.includes(n.cat)) h += 28;
      if (n.cat === 'other') h += 24;
      if (n.cat === 'daw') { h += 16 + n.inPorts.length * 20 + n.outPorts.length * 36; }
      return h;
    }
    function nodeHeightOf(n) { return headerHeightOf(n) + nodeRows(n) * ROW_H + FOOTER_PAD; }

    function updateTransform() {
      canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`;
      zoomLevelEl.textContent = `${Math.round(zoom * 100)}%`;
    }

    function nextPosition() {
      const i = state.nodes.length;
      const col = i % 5, row = Math.floor(i / 5);
      return { x: 100 + col * 272, y: 100 + row * 380 };
    }

    function addNode(gearDef) {
      const id = 'n' + (idCounter++);
      const pos = nextPosition();
      state.nodes.push({
        id, cat: gearDef.cat, label: gearDef.label, sub: '', x: pos.x, y: pos.y,
        inPorts: clonePorts(gearDef.inPorts, false), outPorts: clonePorts(gearDef.outPorts, true),
        nextInType: 'audio', nextOutType: 'audio'
      });
      return id;
    }

    function deleteNode(id) {
      state.nodes = state.nodes.filter(n => n.id !== id);
      state.connections = state.connections.filter(c => c.from !== id && c.to !== id);
      render();
    }

    function stepCount(nodeId, io, delta) {
      const n = state.nodes.find(n => n.id === nodeId); if (!n) return;
      if (!ADJUSTABLE_CATS.includes(n.cat)) return;
      const arr = io === 'in' ? n.inPorts : n.outPorts;
      if (delta > 0) {
        if (arr.length >= 24) return;
        let type = 'audio';
        if (n.cat === 'other') { type = (io === 'in' ? n.nextInType : n.nextOutType) || 'audio'; }
        const label = type === 'midi' ? 'MIDI' : (type === 'control' ? 'CTL' : '');
        const port = { label, type };
        if (io === 'out') port.source = null;
        arr.push(port);
      } else {
        if (arr.length <= 0) return;
        const removedIdx = arr.length - 1;
        arr.pop();
        if (io === 'in') { n.outPorts.forEach(p => { if (p.source === removedIdx) p.source = null; }); }
        state.connections = state.connections.filter(c => {
          if (io === 'in') return !(c.to === nodeId && c.toIdx === removedIdx);
          return !(c.from === nodeId && c.fromIdx === removedIdx);
        });
      }
      render();
    }

    function getPortPos(nodeId, kind, idx) {
      const n = state.nodes.find(n => n.id === nodeId);
      if (!n) return { x: 0, y: 0 };
      return { x: kind === 'out' ? n.x + NODE_W : n.x, y: n.y + headerHeightOf(n) + ROW_H * (idx + 0.5) };
    }
    function getPortType(nodeId, kind, idx) {
      const n = state.nodes.find(n => n.id === nodeId); if (!n) return 'audio';
      const arr = kind === 'out' ? n.outPorts : n.inPorts;
      return (arr[idx] && arr[idx].type) || 'audio';
    }
    function describeDawInput(n, idx) {
      const p = n.inPorts[idx];
      let base = 'In ' + (idx + 1) + (p && p.label ? ': ' + p.label : '');
      const conn = state.connections.find(c => c.to === n.id && c.toIdx === idx);
      if (conn) {
        const src = state.nodes.find(s => s.id === conn.from);
        if (src) {
          const sp = src.outPorts[conn.fromIdx];
          const spLabel = sp && sp.label ? sp.label : ('out ' + (conn.fromIdx + 1));
          base += ' ← ' + src.label + ' (' + spLabel + ')';
        }
      }
      return base;
    }

    function portRowsHtml(n) {
      const skipLabels = n.cat === 'daw';
      const hOffset = headerHeightOf(n);
      let html = '';
      n.inPorts.forEach((p, i) => {
        const y = hOffset + ROW_H * (i + 0.5);
        const cls = p.type === 'midi' ? ' midi' : (p.type === 'control' ? ' control' : '');
        html += `<div class="port in${cls}" data-port-in="${n.id}" data-in-idx="${i}" style="top:${y}px"></div>`;
        if (!skipLabels) html += `<input class="port-label in" data-portlabel-in="${n.id}" data-portlabel-idx="${i}" value="${esc(p.label)}" style="top:${y}px" placeholder="${p.type === 'midi' ? 'MIDI' : (p.type === 'control' ? 'CTL' : '')}" spellcheck="false">`;
      });
      n.outPorts.forEach((p, i) => {
        const y = hOffset + ROW_H * (i + 0.5);
        const cls = p.type === 'midi' ? ' midi' : (p.type === 'control' ? ' control' : '');
        html += `<div class="port out${cls}" data-port-out="${n.id}" data-out-idx="${i}" style="top:${y}px"></div>`;
        if (!skipLabels) html += `<input class="port-label out" data-portlabel-out="${n.id}" data-portlabel-idx="${i}" value="${esc(p.label)}" style="top:${y}px" placeholder="${p.type === 'midi' ? 'MIDI' : (p.type === 'control' ? 'CTL' : '')}" spellcheck="false">`;
      });
      return html;
    }

    function renderNodes() {
      canvas.querySelectorAll('.node').forEach(el => el.remove());
      state.nodes.forEach(n => {
        const h = nodeHeightOf(n);
        const adjustable = ADJUSTABLE_CATS.includes(n.cat);
        const showTypePick = n.cat === 'other';
        const nameEditable = NAME_EDITABLE_CATS.includes(n.cat);
        const isDaw = n.cat === 'daw';

        const nameHtml = nameEditable
          ? `<input class="node-label" data-label="${n.id}" value="${esc(n.label)}" title="${esc(n.label)}" spellcheck="false">`
          : `<div class="node-label static" title="${esc(n.label)}">${esc(n.label)}</div>`;

        let ioHtml = '';
        if (adjustable && showTypePick) {
          const inSel = { audio: n.nextInType !== 'midi' && n.nextInType !== 'control', midi: n.nextInType === 'midi', control: n.nextInType === 'control' };
          const outSel = { audio: n.nextOutType !== 'midi' && n.nextOutType !== 'control', midi: n.nextOutType === 'midi', control: n.nextOutType === 'control' };
          ioHtml = `<div class="io-controls stacked">
          <div class="io-row"><span>IN</span>
            <button data-step-id="${n.id}" data-step-io="in" data-step-delta="-1">−</button>
            <b>${n.inPorts.length}</b>
            <button data-step-id="${n.id}" data-step-io="in" data-step-delta="1">+</button>
            <select class="type-pick" data-typepick-id="${n.id}" data-typepick-io="in">
              <option value="audio"${inSel.audio ? ' selected' : ''}>Audio</option>
              <option value="midi"${inSel.midi ? ' selected' : ''}>MIDI</option>
              <option value="control"${inSel.control ? ' selected' : ''}>Ctl</option>
            </select>
          </div>
          <div class="io-row"><span>OUT</span>
            <button data-step-id="${n.id}" data-step-io="out" data-step-delta="-1">−</button>
            <b>${n.outPorts.length}</b>
            <button data-step-id="${n.id}" data-step-io="out" data-step-delta="1">+</button>
            <select class="type-pick" data-typepick-id="${n.id}" data-typepick-io="out">
              <option value="audio"${outSel.audio ? ' selected' : ''}>Audio</option>
              <option value="midi"${outSel.midi ? ' selected' : ''}>MIDI</option>
              <option value="control"${outSel.control ? ' selected' : ''}>Ctl</option>
            </select>
          </div>
        </div>`;
        } else if (adjustable) {
          ioHtml = `<div class="io-controls">
          <div class="io-row"><span>IN</span>
            <button data-step-id="${n.id}" data-step-io="in" data-step-delta="-1">−</button>
            <b>${n.inPorts.length}</b>
            <button data-step-id="${n.id}" data-step-io="in" data-step-delta="1">+</button>
          </div>
          <div class="io-row"><span>OUT</span>
            <button data-step-id="${n.id}" data-step-io="out" data-step-delta="-1">−</button>
            <b>${n.outPorts.length}</b>
            <button data-step-id="${n.id}" data-step-io="out" data-step-delta="1">+</button>
          </div>
        </div>`;
        }

        const routingHtml = isDaw ? `<div class="routing">
        <div class="routing-title">Internal Routing Matrix</div>
        ${n.inPorts.map((p, i) => `<div class="routing-row"><span class="routing-tag">IN ${i + 1}</span><input data-portlabel-in="${n.id}" data-portlabel-idx="${i}" value="${esc(p.label)}" placeholder="label" spellcheck="false"></div>`).join('')}
        ${n.outPorts.map((p, i) => `<div class="routing-row routing-row-out">
            <div class="routing-row-top"><span class="routing-tag">OUT ${i + 1}</span><input data-portlabel-out="${n.id}" data-portlabel-idx="${i}" value="${esc(p.label)}" placeholder="label" spellcheck="false"></div>
            <select class="routing-source" data-route-id="${n.id}" data-route-idx="${i}">
              <option value=""${p.source == null ? ' selected' : ''}>— source: disconnected —</option>
              ${n.inPorts.map((ip, j) => `<option value="${j}"${p.source === j ? ' selected' : ''}>${esc(describeDawInput(n, j))}</option>`).join('')}
            </select>
          </div>`).join('')}
      </div>` : '';

        const el = document.createElement('div');
        el.className = 'node';
        el.style.left = n.x + 'px'; el.style.top = n.y + 'px';
        el.style.width = NODE_W + 'px'; el.style.height = h + 'px';
        el.style.setProperty('--nc', `var(--${n.cat})`);
        el.dataset.id = n.id;
        el.innerHTML = `
      <div class="node-bar" data-drag="${n.id}"></div>
      <div class="screw tl"></div><div class="screw tr"></div><div class="screw bl"></div><div class="screw br"></div>
      <button class="node-del" data-del="${n.id}">×</button>
      <div class="node-body">
        <div class="node-top">
          <div class="node-icon">${iconSvg(n)}</div>
          <div class="node-titles">
            <div class="cat-tag">${esc(CATS[n.cat].label)}</div>
            ${nameHtml}
          </div>
        </div>
        <input class="node-sub" data-sub="${n.id}" value="${esc(n.sub)}" placeholder="notes" spellcheck="false">
        ${ioHtml}
        ${routingHtml}
      </div>
      ${portRowsHtml(n)}
    `;
        canvas.appendChild(el);
      });
    }

    function cableColorVar(conn) {
      const t = getPortType(conn.from, 'out', conn.fromIdx);
      if (t === 'midi') return 'midi';
      if (t === 'control') return 'accessory';
      const src = state.nodes.find(n => n.id === conn.from);
      return src ? src.cat : 'other';
    }
    function cableD(p1, p2) {
      const dx = Math.max(46, Math.abs(p2.x - p1.x) * 0.5);
      return `M ${p1.x} ${p1.y} C ${p1.x + dx} ${p1.y}, ${p2.x - dx} ${p2.y}, ${p2.x} ${p2.y}`;
    }
    function cableMid(p1, p2) { return { x: (p1.x + p2.x) / 2, y: (p1.y + p2.y) / 2 }; }

    function renderCables() {
      let html = '';
      state.connections.forEach(c => {
        const p1 = getPortPos(c.from, 'out', c.fromIdx), p2 = getPortPos(c.to, 'in', c.toIdx);
        const d = cableD(p1, p2), cv = cableColorVar(c), sel = c.id === selectedCableId;
        html += `<path class="cable-hit" data-cable="${c.id}" d="${d}"/>`;
        html += `<path class="cable${sel ? ' selected' : ''}" data-cable="${c.id}" d="${d}" style="stroke:var(--${cv})"/>`;
        html += `<circle class="cap" cx="${p1.x}" cy="${p1.y}" r="4.5" style="fill:var(--${cv})" stroke="#1c1a17" stroke-width="1"/>`;
        html += `<circle class="cap" cx="${p2.x}" cy="${p2.y}" r="4.5" style="fill:var(--${cv})" stroke="#1c1a17" stroke-width="1"/>`;
        if (c.label) {
          const mid = cableMid(p1, p2);
          const w = Math.max(26, c.label.length * 5.8 + 12);
          html += `<g class="cable-tag" transform="translate(${mid.x - w / 2},${mid.y - 9})"><rect width="${w}" height="16" rx="8" style="fill:var(--panel);stroke:var(--${cv})" stroke-width="1"/><text x="${w / 2}" y="11.5" text-anchor="middle" font-size="9.5" font-family="'JetBrains Mono',monospace" style="fill:var(--${cv})">${esc(c.label)}</text></g>`;
        }
      });
      svg.innerHTML = html;

      const sel = state.connections.find(c => c.id === selectedCableId);
      if (sel) {
        const p1 = getPortPos(sel.from, 'out', sel.fromIdx), p2 = getPortPos(sel.to, 'in', sel.toIdx);
        const mid = cableMid(p1, p2);
        const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        g.setAttribute('class', 'cable-del'); g.style.pointerEvents = 'auto';
        g.innerHTML = `<circle cx="${mid.x + 16}" cy="${mid.y - 16}" r="9" fill="#c9615f" stroke="#1c1a17" stroke-width="1.3"/><text x="${mid.x + 16}" y="${mid.y - 12.5}" text-anchor="middle" font-size="11" fill="#1c1a17" font-family="Inter, sans-serif">×</text>`;
        g.addEventListener('mousedown', (e) => { e.stopPropagation(); deleteConnection(selectedCableId); });
        svg.appendChild(g);
        showCableLabelInput(sel, mid);
      } else {
        hideCableLabelInput();
      }
    }

    function render() { renderNodes(); renderCables(); updateTransform(); }

    function deleteConnection(id) {
      state.connections = state.connections.filter(c => c.id !== id);
      selectedCableId = null;
      renderCables();
    }

    function showCableLabelInput(conn, mid) {
      cableLabelInput.style.display = 'block';
      cableLabelInput.style.left = (mid.x - 70) + 'px';
      cableLabelInput.style.top = (mid.y + 14) + 'px';
      if (document.activeElement !== cableLabelInput) cableLabelInput.value = conn.label || '';
      cableLabelInput.dataset.forCable = conn.id;
    }
    function hideCableLabelInput() {
      if (document.activeElement === cableLabelInput) return;
      cableLabelInput.style.display = 'none';
      delete cableLabelInput.dataset.forCable;
    }
    cableLabelInput.addEventListener('input', () => {
      const id = cableLabelInput.dataset.forCable;
      const c = state.connections.find(c => c.id === id);
      if (c) { c.label = cableLabelInput.value; renderCables(); }
    });

    function tryCompleteConnection(target) {
      if (!pendingConn) return;
      const portEl = target.closest ? target.closest('[data-port-in],[data-port-out]') : null;
      if (!portEl) { return; }
      const isIn = portEl.hasAttribute('data-port-in');
      const tNode = isIn ? portEl.dataset.portIn : portEl.dataset.portOut;
      const tIdx = parseInt(isIn ? portEl.dataset.inIdx : portEl.dataset.outIdx, 10);
      const tKind = isIn ? 'in' : 'out';
      if (tKind === pendingConn.kind) return;
      if (tNode === pendingConn.node && tIdx === pendingConn.idx) return;

      let from, fromIdx, to, toIdx;
      if (pendingConn.kind === 'out') { from = pendingConn.node; fromIdx = pendingConn.idx; to = tNode; toIdx = tIdx; }
      else { from = tNode; fromIdx = tIdx; to = pendingConn.node; toIdx = pendingConn.idx; }

      const st = getPortType(from, 'out', fromIdx), dt = getPortType(to, 'in', toIdx);
      if (st !== dt) { setStatus("Can't connect " + st + " to " + dt); return; }

      state.connections = state.connections.filter(c => !(c.to === to && c.toIdx === toIdx));
      state.connections.push({ id: 'c' + (idCounter++), from, fromIdx, to, toIdx, label: '' });
    }

    // Global Key tracking for Space panning
    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space' && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'SELECT') {
        spacePressed = true;
        if (!isPanning) viewport.style.cursor = 'grab';
      }
    });
    window.addEventListener('keyup', (e) => {
      if (e.code === 'Space') {
        spacePressed = false;
        if (!isPanning) viewport.style.cursor = '';
      }
    });

    // Navigation Pointer Controls (Panning / Dragging)
    viewport.addEventListener('mousedown', (e) => {
      const isMiddleClick = e.button === 1;
      if (spacePressed || isMiddleClick) {
        isPanning = true;
        panStart = { x: e.clientX - panX, y: e.clientY - panY };
        viewport.style.cursor = 'grabbing';
        e.preventDefault();
        return;
      }

      const stepBtn = e.target.closest('[data-step-id]');
      if (stepBtn) { stepCount(stepBtn.dataset.stepId, stepBtn.dataset.stepIo, parseInt(stepBtn.dataset.stepDelta, 10)); e.preventDefault(); return; }

      const delBtn = e.target.closest('[data-del]');
      if (delBtn) { deleteNode(delBtn.dataset.del); return; }

      const bar = e.target.closest('[data-drag]');
      if (bar) {
        const id = bar.dataset.drag;
        const n = state.nodes.find(n => n.id === id);
        dragNode = n;
        dragOffset = {
          x: (e.clientX / zoom) - n.x,
          y: (e.clientY / zoom) - n.y
        };
        e.preventDefault(); return;
      }

      const portIn = e.target.closest('[data-port-in]');
      if (portIn) { pendingConn = { node: portIn.dataset.portIn, idx: parseInt(portIn.dataset.inIdx, 10), kind: 'in' }; e.preventDefault(); return; }

      const portOut = e.target.closest('[data-port-out]');
      if (portOut) { pendingConn = { node: portOut.dataset.portOut, idx: parseInt(portOut.dataset.outIdx, 10), kind: 'out' }; e.preventDefault(); return; }

      if (!e.target.closest('.cable-del') && !e.target.closest('[data-cable]') && e.target !== cableLabelInput) {
        selectedCableId = null; renderCables();
      }
    });

    document.addEventListener('mousemove', (e) => {
      if (isPanning) {
        panX = e.clientX - panStart.x;
        panY = e.clientY - panStart.y;
        updateTransform();
        return;
      }

      if (dragNode) {
        let x = (e.clientX / zoom) - dragOffset.x;
        let y = (e.clientY / zoom) - dragOffset.y;
        x = Math.max(0, Math.min(4000 - NODE_W, x));
        y = Math.max(0, Math.min(4000 - nodeHeightOf(dragNode), y));
        dragNode.x = x; dragNode.y = y;
        const el = canvas.querySelector(`.node[data-id="${dragNode.id}"]`);
        if (el) { el.style.left = x + 'px'; el.style.top = y + 'px'; }
        renderCables();
      } else if (pendingConn) {
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) / zoom;
        const y = (e.clientY - rect.top) / zoom;
        renderCables();
        const p1 = getPortPos(pendingConn.node, pendingConn.kind, pendingConn.idx);
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', cableD(p1, { x, y }));
        path.setAttribute('stroke', '#a49d8f');
        path.setAttribute('stroke-width', '2.5');
        path.setAttribute('stroke-dasharray', '5 4');
        path.setAttribute('fill', 'none');
        svg.appendChild(path);
      }
    });

    document.addEventListener('mouseup', (e) => {
      if (isPanning) {
        isPanning = false;
        viewport.style.cursor = spacePressed ? 'grab' : '';
        return;
      }
      if (dragNode) { dragNode = null; }
      if (pendingConn) { tryCompleteConnection(e.target); pendingConn = null; renderCables(); }
    });

    // Zoom Interactions (Mouse Wheel)
    viewport.addEventListener('wheel', (e) => {
      if (e.ctrlKey || Math.abs(e.deltaY) > 0) {
        e.preventDefault();
        const zoomFactor = 1.1;
        if (e.deltaY < 0) {
          zoom = Math.min(1.5, zoom * zoomFactor);
        } else {
          zoom = Math.max(0.4, zoom / zoomFactor);
        }
        updateTransform();
      }
    }, { passive: false });

    // Topbar Zoom Button UI
    document.getElementById('zoomIn').addEventListener('click', () => { zoom = Math.min(1.5, zoom * 1.1); updateTransform(); });
    document.getElementById('zoomOut').addEventListener('click', () => { zoom = Math.max(0.4, zoom / 1.1); updateTransform(); });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        if (pendingConn) { pendingConn = null; renderCables(); }
        if (selectedCableId) { selectedCableId = null; renderCables(); }
      } else if (e.key === 'Delete' || e.key === 'Backspace') {
        const active = document.activeElement;
        const typing = active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA' || active.isContentEditable || active.tagName === 'SELECT');
        if (!typing && selectedCableId) { deleteConnection(selectedCableId); e.preventDefault(); }
      }
    });

    svg.addEventListener('mousedown', (e) => {
      const cablePath = e.target.closest('[data-cable]');
      if (cablePath) { selectedCableId = cablePath.dataset.cable; renderCables(); }
    });

    canvas.addEventListener('input', (e) => {
      const t = e.target;
      if (t.dataset.label) {
        const n = state.nodes.find(n => n.id === t.dataset.label);
        if (n) { n.label = t.value; t.title = t.value; }
      } else if (t.dataset.sub) {
        const n = state.nodes.find(n => n.id === t.dataset.sub);
        if (n) n.sub = t.value;
      } else if (t.dataset.portlabelIn) {
        const n = state.nodes.find(n => n.id === t.dataset.portlabelIn);
        const idx = parseInt(t.dataset.portlabelIdx, 10);
        if (n && n.inPorts[idx]) n.inPorts[idx].label = t.value;
      } else if (t.dataset.portlabelOut) {
        const n = state.nodes.find(n => n.id === t.dataset.portlabelOut);
        const idx = parseInt(t.dataset.portlabelIdx, 10);
        if (n && n.outPorts[idx]) n.outPorts[idx].label = t.value;
      }
    });

    canvas.addEventListener('change', (e) => {
      const t = e.target;
      if (t.dataset.typepickId) {
        const n = state.nodes.find(n => n.id === t.dataset.typepickId);
        if (n) { if (t.dataset.typepickIo === 'in') n.nextInType = t.value; else n.nextOutType = t.value; }
      } else if (t.dataset.routeId) {
        const n = state.nodes.find(n => n.id === t.dataset.routeId);
        const idx = parseInt(t.dataset.routeIdx, 10);
        if (n && n.outPorts[idx]) { n.outPorts[idx].source = t.value === '' ? null : parseInt(t.value, 10); render(); }
      }
    });

    // --- Sidebar palette ---
    function buildSidebar() {
      const root = document.getElementById('paletteRoot');
      root.innerHTML = CAT_ORDER.map(cat => {
        const items = GEAR.map((g, idx) => ({ g, idx })).filter(x => x.g.cat === cat).map(({ g, idx }) =>
          `<button class="palette-item" style="--nc:var(--${cat})" data-idx="${idx}" data-search="${esc(g.label.toLowerCase())}">${esc(g.label)}</button>`
        ).join('');
        return `<details class="cat-group" open data-cat="${cat}">
      <summary><span class="swatch" style="background:var(--${cat})"></span>${esc(CATS[cat].label)}</summary>
      ${items}
    </details>`;
      }).join('');
    }
    buildSidebar();

    document.getElementById('paletteRoot').addEventListener('click', (e) => {
      const btn = e.target.closest('.palette-item');
      if (!btn) return;
      const g = GEAR[parseInt(btn.dataset.idx, 10)];
      if (g) { addNode(g); render(); }
    });

    document.getElementById('gearSearch').addEventListener('input', (e) => {
      const q = e.target.value.trim().toLowerCase();
      document.querySelectorAll('.cat-group').forEach(group => {
        let any = false;
        group.querySelectorAll('.palette-item').forEach(btn => {
          const match = !q || btn.dataset.search.includes(q);
          btn.style.display = match ? '' : 'none';
          if (match) any = true;
        });
        group.style.display = any ? '' : 'none';
      });
    });

    // --- Legend ---
    document.getElementById('legend').innerHTML =
      CAT_ORDER.map(cat => `<span><i class="swatch" style="background:var(--${cat})"></i>${esc(CATS[cat].label)}</span>`).join('') +
      `<span><i class="swatch midi" style="background:var(--midi)"></i>MIDI</span>` +
      `<span><i class="swatch control" style="background:var(--accessory)"></i>Control</span>`;

    // --- New Workspace ---
    document.getElementById('newBtn').addEventListener('click', async () => {
      if (state.nodes.length) {
        const ok = await Dialog.confirm('Unsaved changes will be lost.', { title: 'Start a new setup?', okText: 'Start New' });
        if (!ok) return;
      }
      state = { nodes: [], connections: [] };
      selectedCableId = null;
      panX = 0; panY = 0; zoom = 1.0;
      document.getElementById('setupName').value = 'Untitled setup';
      render();
    });

    // --- JSON Import / Export Storage Engine (No external web dependency) ---
    function slugify(s) { return s.toLowerCase().trim().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '') || 'setup'; }

    document.getElementById('exportBtn').addEventListener('click', () => {
      const name = document.getElementById('setupName').value.trim() || 'Untitled setup';
      const payload = {
        name,
        nodes: state.nodes,
        connections: state.connections,
        idCounter,
        zoom,
        panX,
        panY
      };
      const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(payload, null, 2));
      const downloadAnchor = document.createElement('a');
      downloadAnchor.setAttribute("href", dataStr);
      downloadAnchor.setAttribute("download", `${slugify(name)}.json`);
      document.body.appendChild(downloadAnchor);
      downloadAnchor.click();
      downloadAnchor.remove();
      setStatus('Exported setup successfully!');
    });

    document.getElementById('importBtn').addEventListener('click', () => {
      document.getElementById('fileImporter').click();
    });

    document.getElementById('fileImporter').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function (evt) {
        try {
          const parsed = JSON.parse(evt.target.result);
          if (parsed.nodes && parsed.connections) {
            state.nodes = parsed.nodes;
            state.connections = parsed.connections;
            idCounter = parsed.idCounter || (state.nodes.reduce((m, n) => Math.max(m, parseInt(n.id.slice(1)) || 0), 0) + 1);
            zoom = parsed.zoom || 1.0;
            panX = parsed.panX || 0;
            panY = parsed.panY || 0;

            document.getElementById('setupName').value = parsed.name || 'Imported Setup';
            selectedCableId = null;
            render();
            setStatus('Setup imported successfully!');
          } else {
            Dialog.alert("That file doesn't have the nodes/connections this app expects.", { kicker: 'ERROR', title: 'Import failed', accent: 'danger' });
          }
        } catch (err) {
          Dialog.alert("Couldn't parse that as a workspace JSON file.", { kicker: 'ERROR', title: 'Import failed', accent: 'danger' });
        }
      };
      reader.readAsText(file);
      e.target.value = ''; // reset file input element
    });
